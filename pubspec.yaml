name: kawal_pe
description: Aplikasi geotagging titik tanam mangrove untuk petugas lapangan BKSDA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database lokal
  sqflite: ^2.3.0
  path: ^1.9.0

  # GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Kamera & foto (hapus flutter_image_compress - pakai image saja)
  image_picker: ^1.1.0
  image: ^4.2.0

  # Cloud sync
  supabase_flutter: ^2.5.0
  connectivity_plus: ^6.0.3
  http: ^1.2.0

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.2
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
