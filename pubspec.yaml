name: kawal_pe
description: Aplikasi geotagging titik tanam mangrove untuk petugas lapangan BKSDA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database lokal
  sqflite: ^2.3.0
  path: ^1.9.0

  # GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Kamera & foto
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  image: ^4.1.0

  # Cloud sync
  supabase_flutter: ^2.3.0
  connectivity_plus: ^6.0.0
  http: ^1.2.0

  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.0
  package_info_plus: ^5.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
